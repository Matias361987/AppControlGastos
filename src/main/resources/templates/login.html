<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppGastos - Login</title>
    <!-- Tailwind CSS desde CDN para desarrollo rápido -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-2xl">
    <div class="text-center mb-10">
        <h1 class="text-3xl font-bold text-white mb-2">Bienvenido</h1>
        <p class="text-slate-400">Gestiona tus gastos con estilo</p>
    </div>

    <form id="loginForm" class="space-y-6">
        <div>
            <label class="block text-sm font-medium mb-2">Usuario</label>
            <input type="text" id="username" required
                   class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-violet-500 transition-all">
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">Contraseña</label>
            <input type="password" id="password" required
                   class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-violet-500 transition-all">
        </div>

        <button type="submit"
                class="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-violet-900/20">
            Iniciar Sesión
        </button>
    </form>

    <p class="mt-8 text-center text-sm text-slate-400">
        ¿No tienes cuenta?
        <a href="/register" class="text-violet-400 hover:text-violet-300 font-medium">Regístrate aquí</a>
    </p>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if (response.ok) {
            window.location.href = '/dashboard';
        } else {
            alert('Credenciales incorrectas');
        }
    });
</script>
</body>
</html>
